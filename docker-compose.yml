services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meristem
      POSTGRES_PASSWORD: meristem
      POSTGRES_DB: meristem
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meristem -d meristem"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "4223:4223"
      - "8222:8222"
    volumes:
      - ./ops/nats/nats.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 10 OpenSearch 读模型，作为可选 compose profile。
  opensearch:
    image: opensearchproject/opensearch:2-alpine
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Meristem0pensearch!"
    ports:
      - "9200:9200"
    profiles:
      - opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -E 'green|yellow|red' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 16 optional cache backend candidate. Redis is not a default dependency.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 16 optional edge gateway example. APISIX must not become an auth or policy root.
  apisix:
    image: apache/apisix:3.9.1-debian
    ports:
      - "9080:9080"
    volumes:
      - ./ops/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./ops/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - apisix
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9080/api/v0/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
