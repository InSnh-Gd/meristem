services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meristem
      POSTGRES_PASSWORD: meristem
      POSTGRES_DB: meristem
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meristem -d meristem"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "4223:4223"
      - "8222:8222"
    volumes:
      - ./ops/nats/nats.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 10 OpenSearch 读模型，作为可选 compose profile。
  opensearch:
    image: opensearchproject/opensearch:2-alpine
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Meristem0pensearch!"
    ports:
      - "9200:9200"
    profiles:
      - opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -E 'green|yellow|red' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
