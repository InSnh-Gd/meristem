name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate:
          - lint
          - format:check
          - typecheck
          - test
          - typecheck:e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.gate }}
        run: bun run "${{ matrix.gate }}"
