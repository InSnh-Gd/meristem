# Optional deployment-pack topology example only.
# This file documents the v0.2 split-container wiring surface and keeps secrets out of the manifest.
# Operators must provide env files / secret refs for every sensitive value before using it.

name: meristem-full-stack-example

services:
  postgres:
    extends:
      file: ../../docker-compose.yml
      service: postgres

  nats:
    extends:
      file: ../../docker-compose.yml
      service: nats

  opensearch:
    extends:
      file: ../../docker-compose.yml
      service: opensearch
    profiles:
      - opensearch

  redis:
    extends:
      file: ../../docker-compose.yml
      service: redis
    profiles:
      - redis

  apisix:
    extends:
      file: ../../docker-compose.yml
      service: apisix
    profiles:
      - apisix

  # The Bun services below intentionally use placeholder build commands.
  # They are topology documentation until internal service URL configuration is split-container ready.
  m-eventbus:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-eventbus"]
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_EVENTBUS_URL: http://m-eventbus:3103
      MERISTEM_POLICY_URL: http://m-policy:3101
      MERISTEM_LOG_URL: http://m-log:3102
      MERISTEM_MNET_URL: http://m-net:3104
      MERISTEM_TASK_URL: http://m-task:3105
      MERISTEM_EXTENSION_URL: http://m-extension:3106
      MERISTEM_UI_BFF_URL: http://m-ui-bff:3200
      MERISTEM_NODE_AGENT_URL: http://node-agent:3307
      MERISTEM_OIDC_ISSUER: ${MERISTEM_OIDC_ISSUER:?set MERISTEM_OIDC_ISSUER}
      MERISTEM_OIDC_DISCOVERY_URL: ${MERISTEM_OIDC_DISCOVERY_URL:?set MERISTEM_OIDC_DISCOVERY_URL}
      MERISTEM_OIDC_AUDIENCES: ${MERISTEM_OIDC_AUDIENCES:?set MERISTEM_OIDC_AUDIENCES}
      MERISTEM_OIDC_ALLOWED_ALGORITHMS: ${MERISTEM_OIDC_ALLOWED_ALGORITHMS:?set MERISTEM_OIDC_ALLOWED_ALGORITHMS}
      MERISTEM_NETBIRD_SIGNAL_ENDPOINT: ${MERISTEM_NETBIRD_SIGNAL_ENDPOINT:?set MERISTEM_NETBIRD_SIGNAL_ENDPOINT}
      MERISTEM_NETBIRD_RELAY_ENDPOINT: ${MERISTEM_NETBIRD_RELAY_ENDPOINT:?set MERISTEM_NETBIRD_RELAY_ENDPOINT}
      MERISTEM_NETBIRD_STUN_ENDPOINT: ${MERISTEM_NETBIRD_STUN_ENDPOINT:?set MERISTEM_NETBIRD_STUN_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    profiles:
      - full-stack-example

  m-policy:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-policy"]
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_JWT_SECRET: ${MERISTEM_JWT_SECRET:?set MERISTEM_JWT_SECRET}
      MERISTEM_OIDC_ISSUER: ${MERISTEM_OIDC_ISSUER:?set MERISTEM_OIDC_ISSUER}
      MERISTEM_OIDC_DISCOVERY_URL: ${MERISTEM_OIDC_DISCOVERY_URL:?set MERISTEM_OIDC_DISCOVERY_URL}
      MERISTEM_OIDC_AUDIENCES: ${MERISTEM_OIDC_AUDIENCES:?set MERISTEM_OIDC_AUDIENCES}
      MERISTEM_OIDC_ALLOWED_ALGORITHMS: ${MERISTEM_OIDC_ALLOWED_ALGORITHMS:?set MERISTEM_OIDC_ALLOWED_ALGORITHMS}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    profiles:
      - full-stack-example

  m-log:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-log"]
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      OPENSEARCH_URL: http://opensearch:9200
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    profiles:
      - full-stack-example

  m-net:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-net"]
    volumes:
      - ../..:/workspace
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_JWT_SECRET: ${MERISTEM_JWT_SECRET:?set MERISTEM_JWT_SECRET}
      MERISTEM_JOIN_PUBLIC_URL: https://localhost:8443
      MERISTEM_OIDC_ISSUER: ${MERISTEM_OIDC_ISSUER:?set MERISTEM_OIDC_ISSUER}
      MERISTEM_OIDC_DISCOVERY_URL: ${MERISTEM_OIDC_DISCOVERY_URL:?set MERISTEM_OIDC_DISCOVERY_URL}
      MERISTEM_OIDC_AUDIENCES: ${MERISTEM_OIDC_AUDIENCES:?set MERISTEM_OIDC_AUDIENCES}
      MERISTEM_OIDC_ALLOWED_ALGORITHMS: ${MERISTEM_OIDC_ALLOWED_ALGORITHMS:?set MERISTEM_OIDC_ALLOWED_ALGORITHMS}
      MERISTEM_NETBIRD_SIGNAL_ENDPOINT: ${MERISTEM_NETBIRD_SIGNAL_ENDPOINT:?set MERISTEM_NETBIRD_SIGNAL_ENDPOINT}
      MERISTEM_NETBIRD_RELAY_ENDPOINT: ${MERISTEM_NETBIRD_RELAY_ENDPOINT:?set MERISTEM_NETBIRD_RELAY_ENDPOINT}
      MERISTEM_NETBIRD_STUN_ENDPOINT: ${MERISTEM_NETBIRD_STUN_ENDPOINT:?set MERISTEM_NETBIRD_STUN_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    profiles:
      - full-stack-example

  m-task:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-task"]
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_JWT_SECRET: ${MERISTEM_JWT_SECRET:?set MERISTEM_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    profiles:
      - full-stack-example

  m-extension:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-extension"]
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_JWT_SECRET: ${MERISTEM_JWT_SECRET:?set MERISTEM_JWT_SECRET}
    depends_on:
      m-eventbus:
        condition: service_started
      m-policy:
        condition: service_started
      m-log:
        condition: service_started
    profiles:
      - full-stack-example

  core:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:core"]
    volumes:
      - ../..:/workspace
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      NATS_URL: ws://nats:4223
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_JWT_SECRET: ${MERISTEM_JWT_SECRET:?set MERISTEM_JWT_SECRET}
      MERISTEM_JOIN_PUBLIC_URL: https://localhost:8443
      MERISTEM_OIDC_ISSUER: ${MERISTEM_OIDC_ISSUER:?set MERISTEM_OIDC_ISSUER}
      MERISTEM_OIDC_DISCOVERY_URL: ${MERISTEM_OIDC_DISCOVERY_URL:?set MERISTEM_OIDC_DISCOVERY_URL}
      MERISTEM_OIDC_AUDIENCES: ${MERISTEM_OIDC_AUDIENCES:?set MERISTEM_OIDC_AUDIENCES}
      MERISTEM_OIDC_ALLOWED_ALGORITHMS: ${MERISTEM_OIDC_ALLOWED_ALGORITHMS:?set MERISTEM_OIDC_ALLOWED_ALGORITHMS}
      MERISTEM_NETBIRD_SIGNAL_ENDPOINT: ${MERISTEM_NETBIRD_SIGNAL_ENDPOINT:?set MERISTEM_NETBIRD_SIGNAL_ENDPOINT}
      MERISTEM_NETBIRD_RELAY_ENDPOINT: ${MERISTEM_NETBIRD_RELAY_ENDPOINT:?set MERISTEM_NETBIRD_RELAY_ENDPOINT}
      MERISTEM_NETBIRD_STUN_ENDPOINT: ${MERISTEM_NETBIRD_STUN_ENDPOINT:?set MERISTEM_NETBIRD_STUN_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      m-extension:
        condition: service_started
    profiles:
      - full-stack-example

  m-ui-bff:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-ui-bff"]
    volumes:
      - ../..:/workspace
    ports:
      - "3200:3200"
    environment:
      MERISTEM_CORE_URL: http://core:3000
      MERISTEM_MNET_URL: http://m-net:3104
      MERISTEM_POLICY_URL: http://m-policy:3101
      MERISTEM_LOG_URL: http://m-log:3102
      MERISTEM_EVENTBUS_URL: http://m-eventbus:3103
      MERISTEM_TASK_URL: http://m-task:3105
      MERISTEM_EXTENSION_URL: http://m-extension:3106
      MERISTEM_UI_BFF_URL: http://m-ui-bff:3200
      MERISTEM_NODE_AGENT_URL: http://node-agent:3307
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_JWT_SECRET: ${MERISTEM_JWT_SECRET:?set MERISTEM_JWT_SECRET}
      MERISTEM_OIDC_ISSUER: ${MERISTEM_OIDC_ISSUER:?set MERISTEM_OIDC_ISSUER}
      MERISTEM_OIDC_DISCOVERY_URL: ${MERISTEM_OIDC_DISCOVERY_URL:?set MERISTEM_OIDC_DISCOVERY_URL}
      MERISTEM_OIDC_AUDIENCES: ${MERISTEM_OIDC_AUDIENCES:?set MERISTEM_OIDC_AUDIENCES}
      MERISTEM_OIDC_ALLOWED_ALGORITHMS: ${MERISTEM_OIDC_ALLOWED_ALGORITHMS:?set MERISTEM_OIDC_ALLOWED_ALGORITHMS}
    depends_on:
      core:
        condition: service_started
    profiles:
      - full-stack-example

  m-ui:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:m-ui"]
    volumes:
      - ../..:/workspace
    ports:
      - "5173:5173"
    depends_on:
      m-ui-bff:
        condition: service_started
    profiles:
      - full-stack-example

  node-agent:
    image: oven/bun:1
    working_dir: /workspace
    command: ["bun", "run", "dev:node-agent"]
    volumes:
      - ../..:/workspace
    environment:
      MERISTEM_JOIN_URL: ${MERISTEM_JOIN_URL:?set MERISTEM_JOIN_URL}
      MERISTEM_MNET_CONTROL_URL: http://m-net:3104
      MERISTEM_INTERNAL_TOKEN: ${MERISTEM_INTERNAL_TOKEN:?set MERISTEM_INTERNAL_TOKEN}
      MERISTEM_OIDC_ISSUER: ${MERISTEM_OIDC_ISSUER:?set MERISTEM_OIDC_ISSUER}
      MERISTEM_OIDC_DISCOVERY_URL: ${MERISTEM_OIDC_DISCOVERY_URL:?set MERISTEM_OIDC_DISCOVERY_URL}
      MERISTEM_OIDC_AUDIENCES: ${MERISTEM_OIDC_AUDIENCES:?set MERISTEM_OIDC_AUDIENCES}
      MERISTEM_OIDC_ALLOWED_ALGORITHMS: ${MERISTEM_OIDC_ALLOWED_ALGORITHMS:?set MERISTEM_OIDC_ALLOWED_ALGORITHMS}
      MERISTEM_NETBIRD_SIGNAL_ENDPOINT: ${MERISTEM_NETBIRD_SIGNAL_ENDPOINT:?set MERISTEM_NETBIRD_SIGNAL_ENDPOINT}
      MERISTEM_NETBIRD_RELAY_ENDPOINT: ${MERISTEM_NETBIRD_RELAY_ENDPOINT:?set MERISTEM_NETBIRD_RELAY_ENDPOINT}
      MERISTEM_NETBIRD_STUN_ENDPOINT: ${MERISTEM_NETBIRD_STUN_ENDPOINT:?set MERISTEM_NETBIRD_STUN_ENDPOINT}
      MERISTEM_WG_BINARY_PATH: ${MERISTEM_WG_BINARY_PATH:?set MERISTEM_WG_BINARY_PATH}
      MERISTEM_IP_BINARY_PATH: ${MERISTEM_IP_BINARY_PATH:?set MERISTEM_IP_BINARY_PATH}
      MERISTEM_WSTUNNEL_BINARY_PATH: ${MERISTEM_WSTUNNEL_BINARY_PATH:?set MERISTEM_WSTUNNEL_BINARY_PATH}
      MERISTEM_WIREGUARD_MODULE_PATH: ${MERISTEM_WIREGUARD_MODULE_PATH:?set MERISTEM_WIREGUARD_MODULE_PATH}
    depends_on:
      m-net:
        condition: service_started
    profiles:
      - full-stack-example
